services:
  - type: web
    name: ai-summarizer-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_API_TOKEN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
